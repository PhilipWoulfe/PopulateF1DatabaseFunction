name: Build and Push F1 API

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # --- JOB 1: THE FACTORY (Build, Test, and Push immutable + test tags) ---
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_name_lower: ${{ steps.image-metadata.outputs.image_name_lower }}
      api_sha_tag: ${{ steps.image-metadata.outputs.api_sha_tag }}
      web_sha_tag: ${{ steps.image-metadata.outputs.web_sha_tag }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Compute image metadata
        id: image-metadata
        run: |
          IMAGE_NAME_LOWER="$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')"
          SHA_TAG="sha-${GITHUB_SHA::7}"
          echo "IMAGE_NAME_LOWER=$IMAGE_NAME_LOWER" >> "$GITHUB_ENV"
          echo "SHA_TAG=$SHA_TAG" >> "$GITHUB_ENV"
          echo "image_name_lower=$IMAGE_NAME_LOWER" >> "$GITHUB_OUTPUT"
          echo "api_sha_tag=${{ env.REGISTRY }}/$IMAGE_NAME_LOWER:$SHA_TAG" >> "$GITHUB_OUTPUT"
          echo "web_sha_tag=${{ env.REGISTRY }}/$IMAGE_NAME_LOWER-web:$SHA_TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Run API/Backend Unit Tests with Coverage
        run: |
          dotnet test tests/F1.Api.Tests/F1.Api.Tests.csproj \
          --configuration Debug \
          --nologo \
          --verbosity minimal \
          --collect:"XPlat Code Coverage" \
          --settings coverlet.api.runsettings \
          --results-directory ./coverage/api-coverage

      - name: Run Web Unit Tests with Web-Only Coverage
        run: |
          dotnet test tests/F1.Web.Tests/F1.Web.Tests.csproj \
          --configuration Debug \
          --nologo \
          --verbosity minimal \
          --collect:"XPlat Code Coverage" \
          --settings coverlet.web.runsettings \
          --results-directory ./coverage/web-coverage

      - name: Code Coverage Summary Report
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: "**/coverage.cobertura.xml"
          badge: true
          fail_below_min: true 
          format: markdown
          output: both
          thresholds: '10 80'

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: src/F1.Api/Dockerfile
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ env.SHA_TAG }}

      - name: Build and push Web image
        uses: docker/build-push-action@v7
        with:
          context: src/F1.Web
          file: src/F1.Web/Dockerfile
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-web:${{ env.SHA_TAG }}
          build-args: |
            COMMIT_HASH=${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          install: true

      - name: Build and push API image (Debug)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: src/F1.Api/Dockerfile
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ env.SHA_TAG }}-debug
          build-args: |
            CONFIGURATION=Debug

      - name: Build and push Web image (Debug)
        uses: docker/build-push-action@v7
        with:
          context: src/F1.Web
          file: src/F1.Web/Dockerfile
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-web:${{ env.SHA_TAG }}-debug
          build-args: |
            COMMIT_HASH=${{ github.sha }}
            CONFIGURATION=Debug

      - name: Promote SHA images to :test tags
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          # Promote API image SHA tag to :test
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:test \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ env.SHA_TAG }}-debug

          # Promote Web image SHA tag to :test
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-web:test \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-web:${{ env.SHA_TAG }}-debug

  run-e2e-test:
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup Chrome for Testing
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2

      - name: Resolve Chrome binary and print versions
        run: |
          set -e
          CHROME_BIN_PATH=""
          if command -v chrome >/dev/null 2>&1; then
            CHROME_BIN_PATH="$(command -v chrome)"
          elif command -v google-chrome >/dev/null 2>&1; then
            CHROME_BIN_PATH="$(command -v google-chrome)"
          elif command -v google-chrome-stable >/dev/null 2>&1; then
            CHROME_BIN_PATH="$(command -v google-chrome-stable)"
          fi

          if [ -z "$CHROME_BIN_PATH" ]; then
            echo "Chrome binary not found in PATH"
            exit 1
          fi

          echo "CHROME_BIN=$CHROME_BIN_PATH" >> "$GITHUB_ENV"
          echo "Using CHROME_BIN=$CHROME_BIN_PATH"
          "$CHROME_BIN_PATH" --version || true
          chromedriver --version || true

      - name: Wait for test deployment to serve current SHA
        env:
          E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}
          E2E_API_BASE_URL: ${{ vars.E2E_API_BASE_URL }}
          E2E_CF_CLIENT_ID: ${{ secrets.E2E_CF_CLIENT_ID }}
          E2E_CF_CLIENT_SECRET: ${{ secrets.E2E_CF_CLIENT_SECRET }}
          E2E_RACE_ID: ${{ vars.E2E_RACE_ID }}
        run: |
          set -euo pipefail

          EXPECTED_SHA="${GITHUB_SHA}"
          BASE_URL="${E2E_BASE_URL%/}"
          API_URL="${E2E_API_BASE_URL%/}"
          RACE_ID="${E2E_RACE_ID:-2025-24-yas_marina}"

          if [ -z "$BASE_URL" ]; then
            echo "E2E_BASE_URL is required"
            exit 1
          fi

          if [ -z "$API_URL" ]; then
            API_URL="$BASE_URL/api"
          fi

          headers=()
          if [ -n "${E2E_CF_CLIENT_ID:-}" ] && [ -n "${E2E_CF_CLIENT_SECRET:-}" ]; then
            headers+=( -H "CF-Access-Client-Id: ${E2E_CF_CLIENT_ID}" )
            headers+=( -H "CF-Access-Client-Secret: ${E2E_CF_CLIENT_SECRET}" )
          fi

          max_attempts=60
          stable_required=3
          stable_count=0

          for attempt in $(seq 1 "$max_attempts"); do
            web_version="$(curl -fsS "${headers[@]}" "$BASE_URL/version.json" 2>/dev/null || true)"
            api_config="$(curl -fsS "${headers[@]}" "$API_URL/selections/$RACE_ID/config" 2>/dev/null || true)"

            web_ok=false
            api_ok=false

            if echo "$web_version" | grep -q "$EXPECTED_SHA"; then
              web_ok=true
            fi

            if echo "$api_config" | grep -Eq "\"raceId\"[[:space:]]*:[[:space:]]*\"$RACE_ID\""; then
              api_ok=true
            fi

            if $web_ok && $api_ok; then
              stable_count=$((stable_count + 1))
            else
              stable_count=0
            fi

            echo "Attempt $attempt/$max_attempts: web_ok=$web_ok api_ok=$api_ok stable_count=$stable_count"

            if [ "$stable_count" -ge "$stable_required" ]; then
              echo "Deployment is stable on expected SHA and race config."
              exit 0
            fi

            sleep 10
          done

          echo "Timed out waiting for deployment to become stable on SHA ${EXPECTED_SHA}."
          echo "Last web version response: $web_version"
          echo "Last API config response: $api_config"
          exit 1

      - name: Run Selenium E2E suite against test
        env:
          E2E_REQUIRED: "true"
          E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}
          E2E_API_BASE_URL: ${{ vars.E2E_API_BASE_URL }}
          E2E_CF_CLIENT_ID: ${{ secrets.E2E_CF_CLIENT_ID }}
          E2E_CF_CLIENT_SECRET: ${{ secrets.E2E_CF_CLIENT_SECRET }}
          E2E_HEADLESS: "true"
          E2E_TIMEOUT_SECONDS: "30"
          E2E_ARTIFACT_PATH: ${{ github.workspace }}/TestResults/e2e/failure-artifacts
          CHROME_BIN: ${{ env.CHROME_BIN }}
          CHROMEDRIVER_LOG: ${{ github.workspace }}/TestResults/e2e/chromedriver.log
        run: |
          dotnet test tests/F1.E2E.Tests/F1.E2E.Tests.csproj \
            --configuration Debug \
            --nologo \
            --verbosity minimal \
            --logger "trx;LogFileName=e2e.trx" \
            --results-directory ./TestResults/e2e

      - name: Upload E2E test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-results
          path: |
            TestResults/e2e/**
            **/TestResults/e2e/**
            **/chromedriver.log

  # --- JOB 2: THE GATEKEEPER (Promote tested image to :stable) ---
  deploy-prod:
    needs:
      - build-and-push
      - run-e2e-test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: production # Requires your manual approval click
    permissions:
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote API image to stable
        run: |
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ needs.build-and-push.outputs.image_name_lower }}:stable \
            ${{ needs.build-and-push.outputs.api_sha_tag }}

      - name: Promote Web image to stable
        run: |
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ needs.build-and-push.outputs.image_name_lower }}-web:stable \
            ${{ needs.build-and-push.outputs.web_sha_tag }}