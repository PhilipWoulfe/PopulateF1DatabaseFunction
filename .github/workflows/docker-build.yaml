name: Build and Push F1 API

on:
  push:
    branches: 
      - main  # Only push to registry for the "Truth" branch
  pull_request:
    branches: 
      - main  # Run tests for ANY PR targeting main
  workflow_dispatch: # Keep your emergency manual button

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read      # Allows the action to checkout your code
  packages: write     # REQUIRED: Allows the action to push to GHCR
  pull-requests: read # Optional: Helps with PR metadata if needed

jobs:
  # --- JOB 1: THE FACTORY (Build, Test, and Push) ---
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run Unit Tests
        run: |
          dotnet test F1Competition.sln \
          --configuration Release \
          --verbosity normal \
          --collect:"XPlat Code Coverage" \
          --results-directory ./coverage

      - name: Code Coverage Summary Report
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage/**/coverage.cobertura.xml
          badge: true
          fail_below_min: true 
          format: markdown
          indicators: true
          output: both
          thresholds: '50 80'

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=test,enable=${{ github.ref != 'refs/heads/main' }}
            type=ref,event=branch
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/F1.Api/Dockerfile
          # ONLY push if it's a direct push to main (merge) or manual run
          # Do NOT push for PR checks
          push: ${{ github.event_name != 'pull_request' }} 
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # --- JOB 2: THE GATEKEEPER (Production Approval) ---
  deploy-prod:
    needs: build-and-push
    if: github.ref == 'refs/heads/main' # Only show the gate for the main branch
    runs-on: ubuntu-latest
    environment: production # This activates the manual review you set up earlier
    steps:
      - name: Approve for Production
        run: |
          echo "Build ${{ github.sha }} has been approved for Production."
          echo "You can now pull this version on your f1-prod server."