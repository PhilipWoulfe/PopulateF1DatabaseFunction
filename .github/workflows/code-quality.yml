name: Code Quality

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: |
          dotnet restore src/F1.Api/F1.Api.csproj
          dotnet restore src/F1.Web/F1.Web.csproj
          dotnet restore tests/F1.Api.Tests/F1.Api.Tests.csproj
          dotnet restore tests/F1.Web.Tests/F1.Web.Tests.csproj

      - name: Check Formatting
        run: |
          dotnet format whitespace F1Competition.sln --verify-no-changes --no-restore \
          --include src/F1.Api src/F1.Core src/F1.Infrastructure src/F1.Services src/F1.Web tests/F1.Api.Tests tests/F1.Web.Tests

      - name: Check Analyzer Warnings
        run: |
          dotnet format analyzers F1Competition.sln --verify-no-changes --no-restore --severity warn \
          --include src/F1.Api src/F1.Core src/F1.Infrastructure src/F1.Services src/F1.Web tests/F1.Api.Tests tests/F1.Web.Tests

  build:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: |
          dotnet restore src/F1.Api/F1.Api.csproj
          dotnet restore src/F1.Web/F1.Web.csproj
          dotnet restore tests/F1.Api.Tests/F1.Api.Tests.csproj
          dotnet restore tests/F1.Web.Tests/F1.Web.Tests.csproj

      - name: Build & Analyze
        run: |
          dotnet build src/F1.Api/F1.Api.csproj --configuration Release --no-restore /warnaserror
          dotnet build src/F1.Web/F1.Web.csproj --configuration Release --no-restore /warnaserror
          dotnet build tests/F1.Api.Tests/F1.Api.Tests.csproj --configuration Release --no-restore /warnaserror
          dotnet build tests/F1.Web.Tests/F1.Web.Tests.csproj --configuration Release --no-restore /warnaserror

  approve-pr:
    runs-on: ubuntu-latest
    needs: [lint, build]
    if: |
      github.event_name == 'pull_request' &&
      github.actor != 'github-actions[bot]' &&
      github.actor != 'dependabot[bot]' &&
      needs.lint.result == 'success' &&
      needs.build.result == 'success'
    permissions:
      # Note: This block limits the default GITHUB_TOKEN only.
      # The github-script step below authenticates with secrets.GC_PAT,
      # so effective API access is determined by the PAT scopes.
      contents: read
      pull-requests: write

    steps:
      - name: GC Approval
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GC_PAT }}
          script: |
            const checks = [
              { name: 'lint', result: '${{ needs.lint.result }}' },
              { name: 'build', result: '${{ needs.build.result }}' }
            ];

            const pullNumber = context.payload.pull_request.number;
            const headSha = context.payload.pull_request.head.sha;

            const authUser = await github.rest.users.getAuthenticated();
            const reviewerLogin = authUser.data.login;

            const existingReviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullNumber,
              per_page: 100
            });

            const hasApprovalForHead = existingReviews.some((review) =>
              review.user?.login === reviewerLogin &&
              review.state === 'APPROVED' &&
              review.commit_id === headSha
            );

            if (hasApprovalForHead) {
              core.info(`Skipping approval; ${reviewerLogin} already approved head commit ${headSha}.`);
              return;
            }

            const unresolvedQuery = `
              query($owner: String!, $repo: String!, $pullNumber: Int!, $cursor: String) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $pullNumber) {
                    reviewThreads(first: 100, after: $cursor) {
                      nodes {
                        isResolved
                      }
                      pageInfo {
                        hasNextPage
                        endCursor
                      }
                    }
                  }
                }
              }
            `;

            let unresolvedThreadCount = 0;
            let cursor = null;

            do {
              const response = await github.graphql(unresolvedQuery, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pullNumber,
                cursor
              });

              const threads = response.repository.pullRequest.reviewThreads;
              unresolvedThreadCount += threads.nodes.filter((thread) => !thread.isResolved).length;
              cursor = threads.pageInfo.hasNextPage ? threads.pageInfo.endCursor : null;
            } while (cursor);

            if (unresolvedThreadCount > 0) {
              core.info(`Skipping approval; unresolved review threads: ${unresolvedThreadCount}`);
              return;
            }

            const body = [
              'GC Agent Auto-Review',
              '',
              'Verified checks:',
              '- Linting passed',
              '- Build passed',
              '- All review comments resolved',
              '',
              '```json',
              JSON.stringify({
                verifiedChecks: checks,
                unresolvedReviewThreads: unresolvedThreadCount,
                decision: 'APPROVE'
              }, null, 2),
              '```'
            ].join('\n');

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullNumber,
              event: 'APPROVE',
              body
            });
