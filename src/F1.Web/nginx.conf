server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # This is the missing piece that prevents the download issue
    include /etc/nginx/mime.types;

    # Ensure wasm is handled if not in your global mime.types
    types {
        application/wasm wasm;
    }

    add_header Blazor-Environment "${BLAZOR_ENVIRONMENT}";

    # Proxy API requests to the internal API container
    location /api/ {
        # 'f1-api' is the service name in docker-compose
        proxy_pass http://f1-api:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cf-Access-Jwt-Assertion $http_cf_access_jwt_assertion;
        proxy_set_header Cf-Access-Authenticated-User-Email $http_cf_access_authenticated_user_email;
        proxy_set_header Cf-Access-Authenticated-User-Id $http_cf_access_authenticated_user_id;
    }

    # Proxy Swagger UI requests
    location /swagger/ {
        proxy_pass http://f1-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}