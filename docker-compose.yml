services:
  postgres:
    image: postgres:16
    container_name: f1-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-f1competition}
      - POSTGRES_USER=${POSTGRES_USER:-f1}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-f1}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-f1} -d ${POSTGRES_DB:-f1competition}"]
      interval: 10s
      timeout: 5s
      retries: 10

  f1-api:
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - AllowedOrigins=${ALLOWED_ORIGINS:-http://localhost:5000,http://localhost:5001,http://localhost:5200}
      - LOG_FILE_PATH=/var/log/f1api
      - ASPNETCORE_ENVIRONMENT=${BLAZOR_ENVIRONMENT:-Development}
      # Map .env variables to ASP.NET Core configuration format
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=${POSTGRES_DB:-f1competition};Username=${POSTGRES_USER:-f1};Password=${POSTGRES_PASSWORD:-f1}
      - CloudflareAccess__Audience=${CLOUDFLARE_AUDIENCE:-CloudflareAccessAudienceNotSet}
      - CloudflareAccess__Issuer=https://f1-team.cloudflareaccess.com
      - CloudflareAccess__AdminGroupClaimType=${ADMIN_GROUP_CLAIM_TYPE:-groups}
      - CloudflareAccess__AdminGroups=${ADMIN_GROUPS:-F1 Admins}
      - CloudflareAccess__AdminEmails=${ADMIN_EMAILS:-}
      - CloudflareAccess__EnableTestServiceTokenFallback=${CLOUDFLARE_ENABLE_TEST_SERVICE_TOKEN_FALLBACK:-false}
      - CloudflareAccess__TestServiceTokenSubjectAllowlist=${CLOUDFLARE_TEST_SERVICE_TOKEN_SUBJECT_ALLOWLIST:-}
      - CloudflareAccess__TestServiceTokenAdminSubjectAllowlist=${CLOUDFLARE_TEST_SERVICE_TOKEN_ADMIN_SUBJECT_ALLOWLIST:-}
      - CloudflareAccess__TestServiceTokenEmailDomain=${CLOUDFLARE_TEST_SERVICE_TOKEN_EMAIL_DOMAIN:-test.local}
      - DevSettings__MockEmail=${DEV_MOCK_EMAIL:-dev-user@example.com}
      - DevSettings__MockGroups=${DEV_MOCK_GROUPS:-F1 Admins,F1 Users}
      - DevSettings__EnableDebugEndpoints=${DEV_ENABLE_DEBUG_ENDPOINTS:-false}
    volumes:
      - ${HOST_LOG_PATH:-/tmp/f1api-logs}:/var/log/f1api
    image: ghcr.io/philipwoulfe/f1competition:${TAG:-test}
    build:
      context: .
      dockerfile: ./src/F1.Api/Dockerfile
    container_name: ${CONTAINER_NAME:-f1-test}
    ports:
      - "${HOST_PORT:-5000}:8080"
    restart: unless-stopped

  f1-web:
    image: ghcr.io/philipwoulfe/f1competition-web:${TAG:-test}
    build:
      context: ./src/F1.Web
      dockerfile: Dockerfile
    container_name: f1-web
    environment:
      - BLAZOR_ENVIRONMENT=${BLAZOR_ENVIRONMENT:-Development}
      - API_BASE_URL=/api/
    ports:
      - "${HOST_PORT_WEB:-5001}:80"
    restart: unless-stopped

  tunnel:
      profiles: ["cloud"] # It won't start unless you specifically ask for it
      image: cloudflare/cloudflared:latest
      container_name: cloudflared-tunnel
      restart: unless-stopped
      command: tunnel --no-autoupdate run
      environment:
        - TUNNEL_TOKEN=${TUNNEL_TOKEN} # Store that token in your .env file

  # watchtower shouldn't be deployed to PROD as it will auto-pull whatever tag the running test containers follow
  watchtower:
      profiles: ["cloud"]  # It won't start unless you specifically ask for it
      image: nickfedor/watchtower:latest 
      container_name: watchtower
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
        - /root/.docker/config.json:/config.json
      environment:
        # Tell watchtower explicitly to use the newer API version
        - DOCKER_API_VERSION=1.44
        - WATCHTOWER_POLL_INTERVAL=30
        - WATCHTOWER_CLEANUP=true
        - DOCKER_CONFIG=/
      restart: unless-stopped

volumes:
  postgres-data:
