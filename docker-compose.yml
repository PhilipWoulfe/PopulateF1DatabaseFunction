services:
  f1-api:
    image: ghcr.io/philipwoulfe/f1competition:${TAG:-latest} # Or :feat-branch-name
    container_name: ${CONTINER_NAME:-f1-test}
    ports:
      - "${HOST_PORT:-5000}:8080"
    restart: unless-stopped

# watchtower shouldn't be deployed to PROD as it will pull the latest build and deploy it
  watchtower:
    # --- SWAP THIS LINE ---
    image: nickfedor/watchtower:latest 
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json
    environment:
      # Tell watchtower explicitly to use the newer API version
      - DOCKER_API_VERSION=1.44
      - WATCHTOWER_POLL_INTERVAL=30
      - WATCHTOWER_CLEANUP=true
      - DOCKER_CONFIG=/
    restart: unless-stopped